name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "URL to smoke test after deployment"
        required: false
        default: "https://priceai.cc"
      collector_runtime_base_ref:
        description: "Base ref for collector runtime watchlist preflight"
        required: false
        default: ""
      collector_runtime_sync_ref:
        description: "Workflow URL, manifest SHA, or release SHA proving Huoshan2 runtime sync"
        required: false
        default: ""
      allow_unsynced_collector_runtime:
        description: "Allow deploy despite collector runtime changes; requires override reason"
        required: false
        type: boolean
        default: false
      collector_runtime_override_reason:
        description: "Explicit reason for deploying without collector runtime sync"
        required: false
        default: ""

concurrency:
  group: priceai-production
  cancel-in-progress: false

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_DEPLOYMENT_ID: ${{ github.sha }}
      CLOUDFLARE_PREVIEW_ALIAS: candidate
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      ADMIN_SESSION_VERSION: ${{ secrets.ADMIN_SESSION_VERSION }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY }}
      PRICEAI_RISK_REVIEW_API_KEY: ${{ secrets.PRICEAI_RISK_REVIEW_API_KEY }}
      PRICEAI_RISK_REVIEW_BASE_URL: ${{ secrets.PRICEAI_RISK_REVIEW_BASE_URL }}
      PRICEAI_RISK_REVIEW_MODEL: ${{ secrets.PRICEAI_RISK_REVIEW_MODEL }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      UMAMI_API_BASE_URL: ${{ vars.UMAMI_API_BASE_URL }}
      UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
      UMAMI_API_TOKEN: ${{ secrets.UMAMI_API_TOKEN }}
      UMAMI_API_USERNAME: ${{ secrets.UMAMI_API_USERNAME }}
      UMAMI_API_PASSWORD: ${{ secrets.UMAMI_API_PASSWORD }}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS: ${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS }}
      NEXT_PUBLIC_TRANSIT_DETECTOR_API_BASE_URL: ${{ vars.NEXT_PUBLIC_TRANSIT_DETECTOR_API_BASE_URL }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Collector runtime preflight
        env:
          COLLECTOR_RUNTIME_BASE_REF: ${{ inputs.collector_runtime_base_ref }}
          COLLECTOR_RUNTIME_SYNC_REF: ${{ inputs.collector_runtime_sync_ref }}
          ALLOW_UNSYNCED_COLLECTOR_RUNTIME: ${{ inputs.allow_unsynced_collector_runtime }}
          COLLECTOR_RUNTIME_OVERRIDE_REASON: ${{ inputs.collector_runtime_override_reason }}
        run: |
          set -euo pipefail

          args=(--target-ref "$GITHUB_SHA")

          if [ -n "${COLLECTOR_RUNTIME_BASE_REF:-}" ]; then
            args+=(--base-ref "$COLLECTOR_RUNTIME_BASE_REF")
          fi

          if [ -n "${COLLECTOR_RUNTIME_SYNC_REF:-}" ]; then
            args+=(--collector-runtime-sync-ref "$COLLECTOR_RUNTIME_SYNC_REF")
          fi

          if [ "${ALLOW_UNSYNCED_COLLECTOR_RUNTIME:-false}" = "true" ]; then
            if [ -z "${COLLECTOR_RUNTIME_OVERRIDE_REASON:-}" ]; then
              echo "collector_runtime_override_reason is required when allow_unsynced_collector_runtime is true."
              exit 1
            fi
            args+=(--allow-collector-runtime-drift "$COLLECTOR_RUNTIME_OVERRIDE_REASON")
          fi

          node scripts/check-collector-runtime-guard.mjs "${args[@]}"

      - run: npm ci

      - run: npm run check:cloudflare-env

      - run: npm run typecheck

      - run: npm test

      - run: npm run lint

      - run: npm run build:cloudflare

      - name: Upload candidate Worker version
        id: upload
        run: npm run upload:cloudflare

      - name: Smoke candidate Preview URL
        run: npm run smoke:cloudflare -- "${{ steps.upload.outputs.smoke_base_url }}"

      - name: Record candidate summary
        run: |
          {
            echo "### Cloudflare candidate"
            echo "- Git SHA: \`${GITHUB_SHA}\`"
            echo "- Version ID: \`${{ steps.upload.outputs.version_id }}\`"
            echo "- Preview: ${{ steps.upload.outputs.smoke_base_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  promote-production:
    needs: build-and-preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
      CLOUDFLARE_PROMOTE_MESSAGE: Promote PriceAI ${{ github.sha }} after preview smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Verify promotion SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - run: npm run promote:cloudflare -- "$GITHUB_SHA"

      - run: npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"
