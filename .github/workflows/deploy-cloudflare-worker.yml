name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: "URL to smoke test after deployment"
        required: false
        default: "https://priceai.cc"
      collector_runtime_base_ref:
        description: "Base ref for collector runtime watchlist preflight"
        required: false
        default: ""
      collector_runtime_sync_ref:
        description: "Workflow URL, manifest SHA, or release SHA proving Huoshan2 runtime sync"
        required: false
        default: ""
      allow_unsynced_collector_runtime:
        description: "Allow deploy despite collector runtime changes; requires override reason"
        required: false
        type: boolean
        default: false
      collector_runtime_override_reason:
        description: "Explicit reason for deploying without collector runtime sync"
        required: false
        default: ""

concurrency:
  group: priceai-production
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      NEXT_DEPLOYMENT_ID: ${{ github.sha }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
      ADMIN_SESSION_VERSION: ${{ secrets.ADMIN_SESSION_VERSION }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY: ${{ secrets.API_TRANSIT_CREDENTIAL_ENCRYPTION_KEY }}
      PRICEAI_RISK_REVIEW_API_KEY: ${{ secrets.PRICEAI_RISK_REVIEW_API_KEY }}
      PRICEAI_RISK_REVIEW_BASE_URL: ${{ secrets.PRICEAI_RISK_REVIEW_BASE_URL }}
      PRICEAI_RISK_REVIEW_MODEL: ${{ secrets.PRICEAI_RISK_REVIEW_MODEL }}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
      UMAMI_API_BASE_URL: ${{ vars.UMAMI_API_BASE_URL }}
      UMAMI_WEBSITE_ID: ${{ vars.UMAMI_WEBSITE_ID }}
      UMAMI_API_TOKEN: ${{ secrets.UMAMI_API_TOKEN }}
      UMAMI_API_USERNAME: ${{ secrets.UMAMI_API_USERNAME }}
      UMAMI_API_PASSWORD: ${{ secrets.UMAMI_API_PASSWORD }}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_UMAMI_SCRIPT_URL }}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${{ vars.NEXT_PUBLIC_UMAMI_WEBSITE_ID }}
      NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS: ${{ vars.NEXT_PUBLIC_UMAMI_ALLOWED_DOMAINS }}
      NEXT_PUBLIC_TRANSIT_DETECTOR_API_BASE_URL: ${{ vars.NEXT_PUBLIC_TRANSIT_DETECTOR_API_BASE_URL }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Collector runtime preflight
        env:
          COLLECTOR_RUNTIME_BASE_REF: ${{ inputs.collector_runtime_base_ref }}
          COLLECTOR_RUNTIME_SYNC_REF: ${{ inputs.collector_runtime_sync_ref }}
          ALLOW_UNSYNCED_COLLECTOR_RUNTIME: ${{ inputs.allow_unsynced_collector_runtime }}
          COLLECTOR_RUNTIME_OVERRIDE_REASON: ${{ inputs.collector_runtime_override_reason }}
        run: |
          set -euo pipefail

          args=(--target-ref "$GITHUB_SHA")

          if [ -n "${COLLECTOR_RUNTIME_BASE_REF:-}" ]; then
            args+=(--base-ref "$COLLECTOR_RUNTIME_BASE_REF")
          fi

          if [ -n "${COLLECTOR_RUNTIME_SYNC_REF:-}" ]; then
            args+=(--collector-runtime-sync-ref "$COLLECTOR_RUNTIME_SYNC_REF")
          fi

          if [ "${ALLOW_UNSYNCED_COLLECTOR_RUNTIME:-false}" = "true" ]; then
            if [ -z "${COLLECTOR_RUNTIME_OVERRIDE_REASON:-}" ]; then
              echo "collector_runtime_override_reason is required when allow_unsynced_collector_runtime is true."
              exit 1
            fi
            args+=(--allow-collector-runtime-drift "$COLLECTOR_RUNTIME_OVERRIDE_REASON")
          fi

          node scripts/check-collector-runtime-guard.mjs "${args[@]}"

      - run: npm ci

      - run: npm run check:cloudflare-env

      - run: npm run typecheck

      - run: npm test

      - run: npm run lint

      - run: npm run build:cloudflare

      - name: Upload candidate Worker version
        id: upload
        run: npm run upload:cloudflare

      - name: Persist uploaded version id
        run: |
          set -euo pipefail
          version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          if ! [[ "$version_id" =~ ^[a-f0-9-]{36}$ ]]; then
            echo "Wrangler did not return a valid Worker version ID."
            exit 1
          fi

      - name: Upload version id artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-version-${{ github.sha }}
          path: .priceai-deploy/cloudflare-version-id
          if-no-files-found: error
          retention-days: 1

      - name: Record uploaded version summary
        run: |
          version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          {
            echo "### Cloudflare uploaded version"
            echo "- Git SHA: \`${GITHUB_SHA}\`"
            echo "- Version ID: \`${version_id}\`"
            echo "- Preview URL: unavailable because this Worker implements a Durable Object"
            echo "- Validation: staged at 0% and tested through a version override before promotion"
          } >> "$GITHUB_STEP_SUMMARY"

  promote-production:
    needs: build-and-upload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
      CLOUDFLARE_PROMOTE_MESSAGE: Promote PriceAI ${{ github.sha }} after staged version-override smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Verify promotion SHA
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Download candidate version id
        uses: actions/download-artifact@v4
        with:
          name: cloudflare-version-${{ github.sha }}
          path: .priceai-deploy

      - name: Verify candidate version id
        run: |
          set -euo pipefail
          candidate_version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          if ! [[ "$candidate_version_id" =~ ^[a-f0-9-]{36}$ ]]; then
            echo "Downloaded candidate Worker version ID is invalid."
            exit 1
          fi
          echo "Candidate Worker version ID artifact is valid."

      - name: Stage candidate at zero percent
        id: stage
        run: |
          set -euo pipefail
          candidate_version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          npm run stage:cloudflare -- "$candidate_version_id"

      - name: Smoke staged candidate with version override
        env:
          CLOUDFLARE_SMOKE_VERSION_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          candidate_version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          CLOUDFLARE_SMOKE_VERSION_ID="$candidate_version_id" npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"

      - name: Promote staged candidate
        run: |
          set -euo pipefail
          candidate_version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          npm run promote:cloudflare -- "$candidate_version_id"

      - name: Smoke production deployment
        env:
          CLOUDFLARE_SMOKE_VERSION_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          candidate_version_id="$(tr -d "\r\n" < .priceai-deploy/cloudflare-version-id)"
          CLOUDFLARE_SMOKE_VERSION_ID="$candidate_version_id" npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"

      - name: Roll back previous Worker version
        if: ${{ failure() }}
        env:
          CLOUDFLARE_PROMOTE_MESSAGE: Roll back failed PriceAI release ${{ github.sha }}
        run: |
          set -euo pipefail
          previous_version_id="$(tr -d "\r\n" < .priceai-deploy/previous-version-id 2>/dev/null || true)"
          if ! [[ "$previous_version_id" =~ ^[a-f0-9-]{36}$ ]]; then
            echo "No previous Worker version was staged; skipping rollback."
            exit 0
          fi
          npm run promote:cloudflare -- "$previous_version_id"
          CLOUDFLARE_SMOKE_SKIP_DEPLOYMENT_CHECK=1 npm run smoke:cloudflare -- "$CLOUDFLARE_SMOKE_BASE_URL"
