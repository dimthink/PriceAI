name: Collect Prices

on:
  # 非 shopApi 常规采集已迁移到 Huoshan2 systemd；shopApi 由国内边缘节点分流。
  # 保留手动触发作为应急兜底，避免 GitHub-hosted runner 与服务器重复采集。
  workflow_dispatch: {}

concurrency:
  group: collect-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Collect prices in runner
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ADMIN_PASSWORD: ${{ secrets.CRON_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICEAI_COLLECTOR_NODE_ID: github-actions
          PRICEAI_COLLECTOR_NODE_NAME: GitHub Actions
          PRICEAI_COLLECTOR_NODE_TYPE: ci
          PRICEAI_COLLECTOR_NODE_RUNTIME: github-actions
          PRICEAI_COLLECTOR_NODE_REGION: github-hosted
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "缺少 NEXT_PUBLIC_SUPABASE_URL 或 SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/collect-prices\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          npm run collect:prices -- --all --post --endpoint "$BASE_URL" --exclude-kind dujiao,shopApi

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
