name: Account Deletion Maintenance

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Maximum deletion requests processed in this run"
        required: false
        default: "5"

concurrency:
  group: account-deletion-maintenance
  cancel-in-progress: false

jobs:
  delete-accounts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Process due account deletion requests
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const url = new URL(process.env.COLLECT_PRICES_URL);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/[^/]+\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          LIMIT="${INPUT_LIMIT:-5}"
          if ! [[ "$LIMIT" =~ ^[0-9]+$ ]] || [ "$LIMIT" -lt 1 ] || [ "$LIMIT" -gt 25 ]; then
            echo "limit 必须是 1 到 25 之间的整数"
            exit 1
          fi

          ACCOUNT_DELETION_URL="$BASE_URL/api/cron/account-deletions?limit=$LIMIT" node <<'NODE'
          const response = await fetch(process.env.ACCOUNT_DELETION_URL, {
            method: "POST",
            headers: { authorization: `Bearer ${process.env.CRON_SECRET}` },
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : null;
          } catch {
            payload = null;
          }

          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.message || payload?.failures?.[0]?.message || text || `HTTP ${response.status}`);
          }

          console.log(JSON.stringify({
            claimed: payload.claimed || 0,
            completed: payload.completed || 0,
            retried: payload.retried || 0,
            evidenceDeleted: payload.evidenceDeleted || 0,
          }));
          NODE

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              title: "PriceAI 账号删除维护失败",
              message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
              severity: "warning",
              source: "github-actions",
              runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }),
          });
          NODE
