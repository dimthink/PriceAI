name: API Transit Retention Maintenance

on:
  schedule:
    - cron: "20 3 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Maximum rows processed per retention category"
        required: false
        default: "5000"
      dry_run:
        description: "Only calculate candidates without deleting rows"
        required: false
        type: boolean
        default: false

concurrency:
  group: api-transit-retention-maintenance
  cancel-in-progress: false

jobs:
  retention:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Apply bounded retention batch
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          INPUT_BATCH_SIZE: ${{ inputs.batch_size }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const url = new URL(process.env.COLLECT_PRICES_URL);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/[^/]+\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          BATCH_SIZE="${INPUT_BATCH_SIZE:-5000}"
          if ! [[ "$BATCH_SIZE" =~ ^[0-9]+$ ]] || [ "$BATCH_SIZE" -lt 100 ] || [ "$BATCH_SIZE" -gt 20000 ]; then
            echo "batch_size 必须是 100 到 20000 之间的整数"
            exit 1
          fi

          APPLY=1
          if [ "${INPUT_DRY_RUN:-false}" = "true" ]; then
            APPLY=0
          fi

          RETENTION_URL="$BASE_URL/api/cron/api-transit-retention?apply=$APPLY&batch=$BATCH_SIZE" node <<'NODE'
          const response = await fetch(process.env.RETENTION_URL, {
            method: "POST",
            headers: { authorization: `Bearer ${process.env.CRON_SECRET}` },
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : null;
          } catch {
            payload = null;
          }

          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.message || text || `HTTP ${response.status}`);
          }

          console.log(JSON.stringify({
            dryRun: payload.dryRun,
            batchSize: payload.batchSize,
            result: payload.result,
            startedAt: payload.startedAt,
            finishedAt: payload.finishedAt,
          }));
          NODE

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({
              title: "PriceAI retention 维护失败",
              message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
              severity: "warning",
              source: "github-actions",
              runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            }),
          });
          NODE
