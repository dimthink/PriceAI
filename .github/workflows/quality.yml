name: Quality

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Performance guard
        run: npm run check:performance

      - name: Supabase recovery baseline guard
        run: npm run check:recovery-baseline

      - name: Direct dependency licenses
        run: npm run audit:licenses

      - name: Generate CycloneDX SBOM
        run: npm run audit:sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: priceai-sbom-${{ github.sha }}
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Build
        run: npm run build
