name: Collect Official Prices

on:
  schedule:
    # 每日触发；脚本按 UTC 日期在每 3 天全量刷新，其余日期只刷新汇率。
    - cron: "10 18 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "official price collection mode"
        required: false
        default: "fx_only"
        type: choice
        options:
          - fx_only
          - weekly_full
      run_direct:
        description: "Run collection directly in GitHub Actions instead of enqueueing a job"
        required: false
        default: true
        type: boolean

concurrency:
  group: collect-official-prices
  cancel-in-progress: false

jobs:
  enqueue:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_direct != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Enqueue official price job
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REQUESTED_MODE: ${{ github.event.inputs.mode }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/collect-prices\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          MODE="${REQUESTED_MODE:-fx_only}"

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/official-prices?mode=$MODE"

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE

  direct-collect:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.run_direct == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Collect and write official prices
        env:
          REQUESTED_MODE: ${{ github.event.inputs.mode }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          MODE=$(node scripts/resolve-official-price-collection-mode.mjs "$EVENT_NAME" "${REQUESTED_MODE:-}")

          if [ "$MODE" = "fx_only" ]; then
            npm run collect:official -- --fx-only --post --mode=worker
          else
            npm run collect:official -- --all --post --mode=worker
          fi

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
