name: Collect API Transit

on:
  schedule:
    # 公开倍率和站方公开监测走云服务器 worker 执行；GitHub 只负责半小时入队。
    - cron: "7,37 * * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "API transit source id"
        required: false
        default: ""

concurrency:
  group: collect-api-transit
  cancel-in-progress: false

jobs:
  enqueue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Enqueue API transit collection job
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REQUESTED_SOURCE: ${{ github.event.inputs.source }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/collect-prices\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          URL="$BASE_URL/api/cron/api-transit-collect"
          if [ -n "${REQUESTED_SOURCE:-}" ]; then
            URL="$URL?station=$REQUESTED_SOURCE"
          fi

          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$URL"

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
