name: Collect API Transit

on:
  schedule:
    # 主采集由 Huoshan2 systemd timer 每 10 分钟执行；GitHub 只保留低频兜底。
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "API transit source id"
        required: false
        default: ""

concurrency:
  group: collect-api-transit
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Collect API transit public pricing and monitoring
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICEAI_API_TRANSIT_TIMEOUT_MS: ${{ vars.PRICEAI_API_TRANSIT_TIMEOUT_MS }}
          REQUESTED_SOURCE: ${{ github.event.inputs.source }}
        run: |
          set -euo pipefail

          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "缺少 NEXT_PUBLIC_SUPABASE_URL 或 SUPABASE_SERVICE_ROLE_KEY secret"
            exit 1
          fi

          source_args=()
          if [ -n "${REQUESTED_SOURCE:-}" ]; then
            source_args=(--source "$REQUESTED_SOURCE")
          fi

          npm run collect:api-transit -- \
            --post \
            --timeoutMs "${PRICEAI_API_TRANSIT_TIMEOUT_MS:-20000}" \
            "${source_args[@]}"

      - name: Refresh API transit public cache
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname
            .replace(/\/api\/cron\/(?:collect-prices|api-transit-probe|api-transit-revalidate)\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          REVALIDATE_URL="$BASE_URL/api/cron/api-transit-revalidate"

          REVALIDATE_URL="$REVALIDATE_URL" node <<'NODE'
          const response = await fetch(process.env.REVALIDATE_URL, {
            method: "POST",
            headers: {
              authorization: `Bearer ${process.env.CRON_SECRET}`,
            },
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : null;
          } catch {
            payload = null;
          }

          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.message || text || `HTTP ${response.status}`);
          }

          console.log(JSON.stringify({
            stationCount: payload.snapshot?.stationCount ?? null,
            snapshotWritten: payload.snapshot?.snapshotWritten ?? null,
            generatedAt: payload.snapshot?.generatedAt || null,
            revalidatedPaths: payload.revalidatedPaths?.length || 0,
          }));
          NODE

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
