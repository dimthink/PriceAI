name: Sync Collector Runtime

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode: source or artifact"
        required: false
        default: "source"
      run_smoke:
        description: "Run API transit public collector service after sync"
        required: false
        default: "false"
      install_launchers:
        description: "Artifact mode only: install root launchers that execute current/"
        required: false
        default: "false"

concurrency:
  group: sync-collector-runtime
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    env:
      COLLECTOR_RUNTIME_DIR: ${{ vars.COLLECTOR_RUNTIME_DIR || '/opt/priceai-nonshop' }}
      COLLECTOR_RUNTIME_SSH_HOST: ${{ secrets.COLLECTOR_RUNTIME_SSH_HOST }}
      COLLECTOR_RUNTIME_SSH_PORT: ${{ secrets.COLLECTOR_RUNTIME_SSH_PORT || '22' }}
      COLLECTOR_RUNTIME_SSH_USER: ${{ secrets.COLLECTOR_RUNTIME_SSH_USER || 'root' }}
      COLLECTOR_RUNTIME_SSH_PRIVATE_KEY: ${{ secrets.COLLECTOR_RUNTIME_SSH_PRIVATE_KEY }}
      MODE: ${{ inputs.mode }}
      RUN_SMOKE: ${{ inputs.run_smoke }}
      INSTALL_LAUNCHERS: ${{ inputs.install_launchers }}
    steps:
      - uses: actions/checkout@v6

      - name: Validate runtime sync inputs and secrets
        run: |
          set -euo pipefail
          missing=()
          [ -n "$COLLECTOR_RUNTIME_SSH_HOST" ] || missing+=(COLLECTOR_RUNTIME_SSH_HOST)
          [ -n "$COLLECTOR_RUNTIME_SSH_PRIVATE_KEY" ] || missing+=(COLLECTOR_RUNTIME_SSH_PRIVATE_KEY)

          if [ "$MODE" != "source" ] && [ "$MODE" != "artifact" ]; then
            echo "mode 必须是 source 或 artifact，当前值：$MODE"
            exit 1
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Collector Runtime 同步缺少以下 GitHub Actions secrets：${missing[*]}"
            echo "请在仓库 Settings > Secrets and variables > Actions 中配置；不要把私钥写入仓库或 workflow。"
            echo "配置说明：docs/deployment.md#collector-runtime-同步"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - run: npm run test:api-transit

      - name: Check runtime scripts
        run: |
          node --check scripts/check-collector-runtime-guard.mjs
          node --check scripts/collector-runtime-policy.mjs
          node --check scripts/sync-collector-runtime-source.mjs
          node --check scripts/build-collector-runtime-artifact.mjs
          node --check scripts/deploy-collector-runtime-artifact.mjs

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$COLLECTOR_RUNTIME_SSH_PRIVATE_KEY" > ~/.ssh/collector_runtime_key
          chmod 600 ~/.ssh/collector_runtime_key
          ssh-keyscan -p "$COLLECTOR_RUNTIME_SSH_PORT" "$COLLECTOR_RUNTIME_SSH_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host priceai-collector-runtime
            HostName $COLLECTOR_RUNTIME_SSH_HOST
            Port $COLLECTOR_RUNTIME_SSH_PORT
            User $COLLECTOR_RUNTIME_SSH_USER
            IdentityFile ~/.ssh/collector_runtime_key
            IdentitiesOnly yes
          EOF

      - name: Sync source runtime
        if: inputs.mode == 'source'
        run: |
          set -euo pipefail
          args=(--apply --host priceai-collector-runtime --remote-root "$COLLECTOR_RUNTIME_DIR" --target-ref "$GITHUB_SHA")
          node scripts/sync-collector-runtime-source.mjs "${args[@]}"

      - name: Build artifact runtime
        if: inputs.mode == 'artifact'
        run: |
          set -euo pipefail
          npm prune --omit=dev
          node scripts/build-collector-runtime-artifact.mjs \
            --target-ref "$GITHUB_SHA" \
            --out-dir dist/collector-runtime

      - name: Deploy artifact runtime
        if: inputs.mode == 'artifact'
        run: |
          set -euo pipefail
          artifact="dist/collector-runtime/priceai-collector-runtime-$GITHUB_SHA.tgz"
          args=(--apply --artifact "$artifact" --host priceai-collector-runtime --remote-root "$COLLECTOR_RUNTIME_DIR")
          if [ "$INSTALL_LAUNCHERS" = "true" ]; then
            args+=(--install-launchers)
          fi
          node scripts/deploy-collector-runtime-artifact.mjs "${args[@]}"

      - name: Smoke API transit public collector
        if: inputs.run_smoke == 'true'
        run: |
          set -euo pipefail
          ssh priceai-collector-runtime 'systemctl start priceai-api-transit-public.service && journalctl -u priceai-api-transit-public.service -n 40 --no-pager'
