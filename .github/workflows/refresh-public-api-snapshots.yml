name: Refresh Public API Snapshots

on:
  schedule:
    # 主刷新由云服务器 systemd timer 承担；GitHub 只保留低频兜底。
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force refresh even when clean or cooling down"
        required: false
        default: "false"

concurrency:
  group: refresh-public-api-snapshots
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Refresh snapshots if due
        env:
          COLLECT_PRICES_URL: ${{ secrets.COLLECT_PRICES_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          FORCE_REFRESH: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          if [ -z "$COLLECT_PRICES_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "缺少 COLLECT_PRICES_URL 或 CRON_SECRET secret"
            exit 1
          fi

          BASE_URL=$(node <<'NODE'
          const raw = process.env.COLLECT_PRICES_URL;
          const url = new URL(raw);
          url.hash = "";
          url.search = "";
          url.pathname = url.pathname.replace(/\/api\/cron\/(?:collect-prices|api-transit-probe|feedback-closeup|account-deletions)\/?$/, "") || "/";
          console.log(url.toString().replace(/\/$/, ""));
          NODE
          )

          FEEDBACK_CLOSEUP_URL="$BASE_URL/api/cron/feedback-closeup?limit=300" node <<'NODE'
          const response = await fetch(process.env.FEEDBACK_CLOSEUP_URL, {
            method: "POST",
            headers: {
              authorization: `Bearer ${process.env.CRON_SECRET}`,
            },
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : null;
          } catch {
            payload = null;
          }

          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.message || text || `HTTP ${response.status}`);
          }

          console.log(JSON.stringify({
            feedbackCloseup: {
              closedFeedback: payload.closeup?.closedFeedbackCount || 0,
              scannedOffers: payload.escalation?.checkedOfferCount || 0,
              autoHiddenOffers: payload.escalation?.autoHiddenOfferCount || 0,
              alreadyUnavailableOffers: payload.escalation?.alreadyUnavailableOfferCount || 0,
              snapshotRefreshQueued: payload.snapshotRefreshQueued || false,
            },
          }));
          NODE

          SNAPSHOT_URL="$BASE_URL/api/admin/public-api-snapshots"
          if [ "${FORCE_REFRESH:-false}" = "true" ]; then
            SNAPSHOT_URL="$SNAPSHOT_URL?force=1"
          fi

          SNAPSHOT_URL="$SNAPSHOT_URL" node <<'NODE'
          const response = await fetch(process.env.SNAPSHOT_URL, {
            method: "POST",
            headers: {
              authorization: `Bearer ${process.env.CRON_SECRET}`,
            },
          });
          const text = await response.text();
          let payload = null;
          try {
            payload = text ? JSON.parse(text) : null;
          } catch {
            payload = null;
          }

          if (!response.ok || payload?.ok === false) {
            throw new Error(payload?.message || text || `HTTP ${response.status}`);
          }

          console.log(JSON.stringify({
            refreshed: payload.refreshed,
            skipped: payload.skipped,
            reason: payload.reason,
            retryAfter: payload.retryAfter || null,
            mode: payload.result?.mode || null,
            explorer: payload.result?.explorer ?? null,
            offers: payload.result?.offers ?? null,
            productIds: payload.result?.productIds?.length || 0,
            productOffers: payload.result?.productOffers?.length || 0,
          }));
          NODE

      - name: Notify failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.PRICEAI_ALERT_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            exit 0
          fi

          node <<'NODE'
          const payload = {
            title: "PriceAI GitHub Actions 失败",
            message: `${process.env.GITHUB_WORKFLOW} #${process.env.GITHUB_RUN_NUMBER} failed on ${process.env.GITHUB_REF_NAME}`,
            severity: "warning",
            source: "github-actions",
            runUrl: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
          };

          await fetch(process.env.WEBHOOK_URL, {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          NODE
